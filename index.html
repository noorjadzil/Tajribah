<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAQSHOF Offline</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>MAQSHOF</h1>
      <p>Aplikasi input masuk & sisa - offline IndexedDB</p>
    </div>
    <span id="statusBadge" class="badge">Offline Ready</span>
  </header>

  <main class="container">
    <nav class="tabs">
      <button class="tab active" data-page="inputPage">Input</button>
      <button class="tab" data-page="laporanPage">Laporan</button>
      <button class="tab" data-page="settingPage">Setting</button>
    </nav>

    <section id="inputPage" class="page active">
      <div class="card">
        <h2>Input Harian</h2>
        <label>Tanggal</label>
        <input type="date" id="tanggalInput" />

        <label>Catatan</label>
        <input type="text" id="catatanInput" placeholder="Contoh: Setoran pagi / sore" />

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Item</th>
                <th>Harga</th>
                <th>Masuk</th>
                <th>Sisa</th>
              </tr>
            </thead>
            <tbody id="inputTable"></tbody>
          </table>
        </div>

        <button id="simpanBtn" class="primary">Simpan Data</button>
      </div>
    </section>

    <section id="laporanPage" class="page">
      <div class="card">
        <div class="row-between">
          <h2>Laporan</h2>
          <button id="hapusSemuaBtn" class="danger small">Hapus Semua Data</button>
        </div>

        <label>Filter tanggal</label>
        <input type="date" id="filterTanggal" />

        <div class="actions">
          <button id="lihatSemuaBtn" class="secondary">Lihat Semua</button>
          <button id="exportBtn" class="secondary">Export JSON</button>
        </div>

        <div id="ringkasanBox" class="summary"></div>
        <div id="laporanList"></div>
      </div>
    </section>

    <section id="settingPage" class="page">
      <div class="card">
        <h2>Setting Item</h2>
        <p class="muted">Tambah, ubah, atau hapus item. Semua tersimpan offline di IndexedDB.</p>

        <div class="setting-grid">
          <input type="hidden" id="editItemId" />
          <div>
            <label>Nama item</label>
            <input type="text" id="namaItem" placeholder="Contoh: Es Teh" />
          </div>
          <div>
            <label>Harga</label>
            <input type="number" id="hargaItem" placeholder="2700" />
          </div>
        </div>

        <button id="simpanItemBtn" class="primary">Tambah Item</button>
        <button id="batalEditBtn" class="secondary hidden">Batal Edit</button>

        <div id="itemList" class="item-list"></div>
      </div>
    </section>
  </main>

  <footer>
    <small>MAQSHOF Offline · GitHub Pages · IndexedDB</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
