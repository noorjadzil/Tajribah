<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Baca Arab</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.app{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:28px;
  padding:25px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}

h1{
  font-size:26px;
  margin-bottom:10px;
}

.level{
  color:#38bdf8;
  margin-bottom:20px;
}

.arabic{
  font-size:60px;
  margin:25px 0;
  direction:rtl;
}

.latin{
  font-size:22px;
  color:#facc15;
  margin-bottom:20px;
}

button{
  width:100%;
  border:none;
  padding:16px;
  border-radius:18px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.mic{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
}

.repeat{
  background:#334155;
  color:white;
}

.status{
  margin-top:20px;
  min-height:40px;
  font-size:18px;
}

.result{
  margin-top:15px;
  color:#cbd5e1;
  font-size:15px;
}

.correct{color:#4ade80}
.wrong{color:#fb7185}
</style>
</head>

<body>

<div class="app">
  <h1>🎮 Game Baca Arab</h1>
  <div class="level" id="level">Level 1</div>

  <div class="arabic" id="arabic">كِتَابٌ</div>
  <div class="latin">Baca: <span id="latin">kitabun</span></div>

  <button class="mic" onclick="startVoice()">🎤 Ucapkan Sekarang</button>
  <button class="repeat" onclick="repeatWord()">🔊 Contoh Bacaan</button>

  <div class="status" id="status">Tekan tombol mic lalu ucapkan.</div>
  <div class="result" id="result"></div>
</div>

<script>
const questions = [
  { arabic:"كِتَابٌ", latin:"kitabun" },
  { arabic:"بَيْتٌ", latin:"baitun" },
  { arabic:"قَلَمٌ", latin:"qolamun" },
  { arabic:"مَسْجِدٌ", latin:"masjidun" },
  { arabic:"بَابٌ", latin:"babun" },
  { arabic:"مَكْتَبٌ", latin:"maktabun" },
  { arabic:"سَيَّارَةٌ", latin:"sayyarotun" },
  { arabic:"مَدْرَسَةٌ", latin:"madrosatun" }
];

let index = 0;

function showQuestion(){
  document.getElementById("level").innerText = "Level " + (index + 1);
  document.getElementById("arabic").innerText = questions[index].arabic;
  document.getElementById("latin").innerText = questions[index].latin;
  document.getElementById("status").innerText = "Tekan tombol mic lalu ucapkan.";
  document.getElementById("status").className = "status";
  document.getElementById("result").innerText = "";
}

function normalize(text){
  return text
    .toLowerCase()
    .replaceAll("kh","h")
    .replaceAll("q","k")
    .replaceAll("sh","s")
    .replaceAll("sy","s")
    .replaceAll("aa","a")
    .replaceAll("oo","o")
    .replaceAll("ā","a")
    .replaceAll("ū","u")
    .replaceAll("ī","i")
    .replace(/[^a-z\s]/g,"")
    .trim();
}

function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Browser tidak mendukung voice recognition. Coba pakai Google Chrome.");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "id-ID";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  document.getElementById("status").innerText = "🎧 Mendengarkan...";
  document.getElementById("status").className = "status";

  recognition.start();

  recognition.onresult = function(event){
    const heard = event.results[0][0].transcript;
    const target = questions[index].latin;

    document.getElementById("result").innerText = "Terdengar: " + heard;

    const cleanHeard = normalize(heard);
    const cleanTarget = normalize(target);

    if(cleanHeard.includes(cleanTarget)){
      document.getElementById("status").innerText = "✅ Benar! Lanjut...";
      document.getElementById("status").className = "status correct";

      setTimeout(() => {
        index++;
        if(index >= questions.length){
          document.querySelector(".app").innerHTML = `
            <h1>🎉 Selesai!</h1>
            <p style="font-size:20px;margin:20px 0">MasyaAllah, semua level berhasil.</p>
            <button class="mic" onclick="location.reload()">Main Lagi</button>
          `;
        }else{
          showQuestion();
        }
      }, 1200);

    }else{
      document.getElementById("status").innerText = "❌ Salah. Ulangi lagi.";
      document.getElementById("status").className = "status wrong";
    }
  };

  recognition.onerror = function(){
    document.getElementById("status").innerText = "Mic gagal. Coba ulangi.";
    document.getElementById("status").className = "status wrong";
  };
}

function repeatWord(){
  const text = questions[index].latin;
  const voice = new SpeechSynthesisUtterance(text);
  voice.lang = "id-ID";
  voice.rate = 0.75;
  speechSynthesis.speak(voice);
}

showQuestion();
</script>

</body>
</html>
